<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minerva — Optimization Agent</title>
  <link rel="stylesheet" href="minerva/minerva.css" />
</head>
<body>
  <div id="minerva-bg">
    <canvas data-constellation data-density="0.7" data-anchor="0.5,0.32"></canvas>
  </div>

  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- background animation -->
  <script src="assets/constellation.js"></script>

  <!-- data + live transport (plain) -->
  <script src="minerva/data.js"></script>
  <script src="minerva/transport.js"></script>

  <!-- components (Babel/JSX) -->
  <script type="text/babel" src="minerva/ui.jsx"></script>
  <script type="text/babel" src="minerva/objective.jsx"></script>
  <script type="text/babel" src="minerva/investigation.jsx"></script>
  <script type="text/babel" src="minerva/board.jsx"></script>
  <script type="text/babel" src="minerva/detail.jsx"></script>
  <script type="text/babel" src="minerva/verdict.jsx"></script>
  <script type="text/babel" src="minerva/app.jsx"></script>
</body>
</html>
